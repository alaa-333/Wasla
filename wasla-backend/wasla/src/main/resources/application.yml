spring:
  application:
    name: movemate-backend

  profiles:
    active: dev

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    clean-disabled: false
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

# ═══ Application Custom Properties ═══
app:
  jwt:
    secret: ${JWT_SECRET:moveMateDefaultSecretKeyForDevelopmentOnly2026MustBeAtLeast256Bits}
    access-token-expiry-ms: 604800000     # 7 days (7 * 24 * 60 * 60 * 1000)
    refresh-token-expiry-ms: 604800000    # Not used, kept for compatibility

  otp:
    length: 6
    expiry-minutes: 5
    max-requests-per-window: 3
    window-minutes: 10

  job:
    expiry-minutes: 30
    nearby-radius-km: 15

  location:
    update-interval-seconds: 5
    db-sync-interval-seconds: 30

# ═══ Springdoc / Swagger ═══
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
