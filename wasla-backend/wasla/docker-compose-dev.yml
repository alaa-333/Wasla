# Docker Compose for Local Development
# Run infrastructure in Docker, application locally (IDE or mvn spring-boot:run)
# Usage: docker-compose -f docker-compose-dev.yml up -d

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wasla-postgres-dev
    environment:
      POSTGRES_DB: wasla
      POSTGRES_USER: wasla
      POSTGRES_PASSWORD: wasla123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    command: postgres -c 'max_connections=200'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasla -d wasla"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wasla-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wasla-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wasla.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_dev:
  redis_data_dev:
