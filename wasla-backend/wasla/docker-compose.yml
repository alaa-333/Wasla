services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wasla-postgres
    environment:
      POSTGRES_DB: wasla
      POSTGRES_USER: wasla
      POSTGRES_PASSWORD: wasla123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasla -d wasla"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wasla-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wasla-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wasla
      SPRING_DATASOURCE_USERNAME: wasla
      SPRING_DATASOURCE_PASSWORD: wasla123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: moveMateDefaultSecretKeyForDevelopmentOnly2026MustBeAtLeast256Bits
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wasla-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wasla.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
